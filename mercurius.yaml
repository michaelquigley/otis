# example mercurius.yaml. copy this into a project directory as
# `mercurius.yaml` and edit the fields below. fields omitted here fall back to
# sane defaults (log_destination: .mercurius, max_findings: 6). the project
# name is derived from the directory holding the config file.

max_findings: 6

# review_context describes project posture and constraints. it calibrates
# reviewer rigor by stating what's true about the project: deployment model,
# stakes, scope, locked decisions, simplicity-vs-defensiveness preference. the
# reviewer suppresses findings that do not materially apply under this context.
review_context: |
  personal tool, single supervised implementer. pre-1.0; breaking changes are
  acceptable. prefer simple over highly defensive when both achieve correctness.
  out of scope: production-grade observability and multi-tenant concerns.

# review_focus directs the reviewer at project-specific surfaces that the base
# review philosophy does not already cover. the base prompt already carries
# the universal subtle-vs-obvious filter, so this field is typically just one
# paragraph naming the invariants or risks unique to this project.
review_focus: |
  pay particular attention to invariants specific to this project that the
  universal what-to-flag criteria do not already cover.

reviewer:
  name: codex
  impl: codex
  model: gpt-5.5
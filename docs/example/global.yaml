bok:
  path: ./bok

storage:
  state_dir: ./.state

prompt:
  per_file_bytes: 8192
  total_scope_bytes: 262144

api:
  listen: "127.0.0.1:8443"

notification:
  mattermost:
    url: ""
    token_env: MATTERMOST_TOKEN
  report_base_url: https://otis.example.com

reviewers:
  dummy:
    concurrency_cap: 1
    window: manual
    output_path: ./dummy-output.json
  codex:
    binary: codex
    default_model: gpt-5.4
    concurrency_cap: 1
    window: anytime
  claude-code:
    binary: claude
    default_model: opus-4.7
    concurrency_cap: 1
    window: anytime
  pi:
    binary: pi
    default_model: ollama/llama3.3
    concurrency_cap: 1
    window: anytime

windows:
  manual:
    hours: "00:00-00:00"
  anytime:
    hours: "00:00-24:00"

global_concurrency_cap: 1

projects:
  - name: testproj
    path: ./testproj
